name: Deploy Solomon

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: solomon-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOY_HOST: 91.98.68.42
      DEPLOY_USER: root
      DEPLOY_KEY: ${{ secrets.SOLOMON_DEPLOY_KEY }}
      DEPLOY_PATH: /root/app/solomon
      DEPLOY_PORT: 22
      REPO_SSH_URL: git@github.com:${{ github.repository }}.git
      DEPLOY_BRANCH: main
    steps:
      - name: Validate deployment secret
        run: |
          if [ -z "${DEPLOY_KEY}" ]; then
            echo "::error::Missing required secret: SOLOMON_DEPLOY_KEY"
            exit 1
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Git deploy + rebuild Solomon
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" <<EOF
          set -euo pipefail

          export REPO_SSH_URL="${REPO_SSH_URL}"
          export DEPLOY_PATH="${DEPLOY_PATH}"
          export DEPLOY_BRANCH="${DEPLOY_BRANCH}"

          # Use server-side deploy key for GitHub access
          if [ ! -f "/root/.ssh/solomon_github_actions" ]; then
            echo "[deploy] Missing server deploy key: /root/.ssh/solomon_github_actions" >&2
            exit 1
          fi
          mkdir -p /root/.ssh
          chmod 600 /root/.ssh/solomon_github_actions
          ssh-keyscan -H github.com >> /root/.ssh/known_hosts 2>/dev/null || true

          export GIT_SSH_COMMAND="ssh -i /root/.ssh/solomon_github_actions -o IdentitiesOnly=yes"

          mkdir -p "${DEPLOY_PATH}"

          if [ ! -d "${DEPLOY_PATH}/.git" ]; then
            echo "[deploy] No .git found; cloning ${REPO_SSH_URL} (${DEPLOY_BRANCH})"
            env_backup=""
            if [ -f "${DEPLOY_PATH}/.env" ]; then
              env_backup="$(mktemp)"
              cp "${DEPLOY_PATH}/.env" "${env_backup}"
            fi

            rm -rf "${DEPLOY_PATH}"
            git clone --branch "${DEPLOY_BRANCH}" "${REPO_SSH_URL}" "${DEPLOY_PATH}"

            if [ -n "${env_backup}" ]; then
              cp "${env_backup}" "${DEPLOY_PATH}/.env"
              rm -f "${env_backup}"
            fi
          fi

          cd "${DEPLOY_PATH}"

          echo "[deploy] Fetching and resetting to origin/${DEPLOY_BRANCH}"
          git remote set-url origin "${REPO_SSH_URL}"
          git fetch --prune origin "${DEPLOY_BRANCH}"
          git checkout -B "${DEPLOY_BRANCH}" "origin/${DEPLOY_BRANCH}"
          git reset --hard "origin/${DEPLOY_BRANCH}"

          echo "[deploy] Rebuilding and restarting container"
          docker compose up -d --build --remove-orphans
          EOF
